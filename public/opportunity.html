<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create Opportunity</title>

    <style>
      * {
        box-sizing: border-box;

        font-family: Inter, Arial, sans-serif;
      }

      body {
        margin: 0;

        background: linear-gradient(135deg, #2563eb, #0f172a);

        padding: 40px;
      }

      .container {
        max-width: 1000px;

        margin: auto;

        background: white;

        padding: 40px;

        border-radius: 25px;

        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      }

      .header {
        text-align: center;
      }

      .header h1 {
        font-size: 36px;

        color: #0f172a;
      }

      .header p {
        color: #64748b;
      }

      .grid {
        display: grid;

        grid-template-columns: repeat(2, 1fr);

        gap: 25px;

        margin-top: 30px;
      }

      .input-box {
        position: relative;
      }

      input,
      select,
      textarea {
        width: 100%;

        padding: 15px;

        border-radius: 12px;

        border: 1px solid #cbd5e1;

        font-size: 15px;
      }

      textarea {
        resize: none;
      }

      label {
        color: #64748b;
      }

      .input-box label {
        position: absolute;

        top: 15px;

        left: 15px;

        background: white;

        padding: 0 5px;

        pointer-events: none;

        transition: 0.3s;
      }

      input:focus + label,
      input:valid + label,
      textarea:focus + label,
      textarea:valid + label {
        top: -10px;

        font-size: 12px;

        color: #2563eb;
      }

      .upload {
        margin-top: 30px;
      }

      #preview {
        margin-top: 15px;

        width: 200px;

        border-radius: 15px;

        display: block;
      }

      .array-section {
        margin-top: 30px;

        padding: 20px;

        background: #f8fafc;

        border-radius: 15px;
      }

      .array-section input {
        margin-bottom: 10px;
      }

      button {
        padding: 12px 20px;

        border: none;

        border-radius: 10px;

        background: #2563eb;

        color: white;

        cursor: pointer;
      }

      .submit {
        width: 100%;

        margin-top: 30px;

        font-size: 18px;
      }

      #message {
        text-align: center;

        font-weight: bold;
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .container {
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Create New Opportunity</h1>

        <p>Publish jobs, internships, training programs and workshops.</p>
      </div>

      <form id="opportunityForm">
        <div class="grid">
          <div class="input-box">
            <input type="text" id="title" required />

            <label> Opportunity Title </label>
          </div>

          <div class="input-box">
            <select id="category">
              <option>Select Category</option>

              <option>Job</option>

              <option>Internship</option>

              <option>Training</option>

              <option>Workshop</option>

              <option>Summer School</option>
            </select>
          </div>

          <div class="input-box">
            <select id="opportunityType">
              <option>Opportunity Type</option>

              <option>Full-time</option>

              <option>Part-time</option>

              <option>Contract</option>

              <option>Volunteer</option>
            </select>
          </div>

          <div class="input-box">
            <input type="text" id="location" />

            <label> Location </label>
          </div>

          <div class="input-box">
            <input type="text" id="duration" />

            <label> Duration </label>
          </div>

          <div class="input-box">
            <input type="date" id="startDate" />

            <label> Start Date </label>
          </div>
        </div>

        <div class="upload">
          <label> Opportunity Image </label>

          <input type="file" id="image" accept="image/*" />

          <img id="preview" />
        </div>

        <div class="textarea">
          <textarea id="description" rows="5"></textarea>

          <label> Description </label>
        </div>

        <div class="array-section">
          <h3>Responsibilities</h3>

          <div id="responsibilities"></div>

          <button type="button" onclick="addField('responsibilities')">
            + Add Responsibility
          </button>
        </div>

        <div class="array-section">
          <h3>Requirements</h3>

          <div id="requirements"></div>

          <button type="button" onclick="addField('requirements')">
            + Add Requirement
          </button>
        </div>

        <div class="array-section">
          <h3>Benefits</h3>

          <div id="benefits"></div>

          <button type="button" onclick="addField('benefits')">
            + Add Benefit
          </button>
        </div>

        <button class="submit">Create Opportunity</button>

        <p id="message"></p>
      </form>
    </div>

    <script>
      const image = document.getElementById("image");

      const preview = document.getElementById("preview");

      image.onchange = function () {
        const file = this.files[0];

        if (file) {
          preview.src = URL.createObjectURL(file);
        }
      };

      function addField(id) {
        const div = document.getElementById(id);

        const input = document.createElement("input");

        input.type = "text";

        input.placeholder = "Enter item";

        div.appendChild(input);
      }

      addField("responsibilities");

      addField("requirements");

      addField("benefits");

      document
        .getElementById("opportunityForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const getArray = (id) => {
            return [
              ...document.getElementById(id).querySelectorAll("input"),
            ].map((x) => x.value);
          };

          const data = {
            title: title.value,

            category: category.value,

            opportunityType: opportunityType.value,

            description: description.value,

            location: location.value,

            duration: duration.value,

            responsibilities: getArray("responsibilities"),

            requirements: getArray("requirements"),

            benefits: getArray("benefits"),

            startDate: startDate.value,
          };

          const response = await fetch(
            "https://talenthub-v85u.onrender.com/api/opportunities/create-opportunity",

            {
              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              credentials: "include",

              body: JSON.stringify(data),
            },
          );

          const result = await response.json();

          if (response.ok) {
            document.getElementById("message").innerHTML =
              "✅ Opportunity Created Successfully";
          } else {
            document.getElementById("message").innerHTML = result.message;
          }
        });
    </script>
  </body>
</html>
