<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Apply For Opportunity</title>

    <style>
      * {
        box-sizing: border-box;

        font-family: "Inter", Arial, sans-serif;
      }

      body {
        margin: 0;

        min-height: 100vh;

        background: linear-gradient(135deg, #2563eb, #0f172a);

        display: flex;

        align-items: center;

        justify-content: center;

        padding: 30px;
      }

      .container {
        width: 100%;

        max-width: 600px;

        background: white;

        padding: 40px;

        border-radius: 25px;

        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      .hero {
        text-align: center;

        margin-bottom: 35px;
      }

      .hero h1 {
        font-size: 36px;

        color: #0f172a;
      }

      .hero p {
        color: #64748b;
      }

      .input-box {
        position: relative;

        margin-bottom: 25px;
      }

      input,
      select {
        width: 100%;

        padding: 16px;

        border-radius: 12px;

        border: 1px solid #cbd5e1;

        font-size: 15px;

        outline: none;
      }

      label {
        position: absolute;

        left: 15px;

        top: 16px;

        color: #64748b;

        background: white;

        padding: 0 5px;

        transition: 0.3s;

        pointer-events: none;
      }

      input:focus + label,
      input:valid + label {
        top: -10px;

        font-size: 12px;

        color: #2563eb;
      }

      .cv-box {
        background: #f8fafc;

        padding: 20px;

        border-radius: 15px;

        margin-bottom: 25px;
      }

      .cv-box input {
        border: none;

        background: white;
      }

      #fileName {
        color: #64748b;

        font-size: 14px;
      }

      button {
        width: 100%;

        padding: 16px;

        background: #2563eb;

        border: none;

        border-radius: 12px;

        color: white;

        font-size: 18px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
      }

      button:hover {
        background: #1d4ed8;
      }

      #message {
        text-align: center;

        font-weight: bold;

        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="hero">
        <h1>Start Your Career Journey</h1>

        <p>Apply for jobs, internships and training programs.</p>
      </div>

      <form id="applicationForm">
        <div class="input-box">
          <input type="text" id="fullName" required />

          <label> Full Name </label>
        </div>

        <div class="input-box">
          <input type="email" id="email" required />

          <label> Email Address </label>
        </div>

        <div class="input-box">
          <input type="tel" id="phone" required />

          <label> Phone Number </label>
        </div>

        <div class="cv-box">
          <h3>Upload CV</h3>

          <input type="file" id="cv" accept=".pdf,.doc,.docx" />

          <p id="fileName">No file selected</p>
        </div>

        <button type="submit">Submit Application</button>

        <p id="message"></p>
      </form>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const oppId = urlParams.get("id");

      const cv = document.getElementById("cv");

      const fileName = document.getElementById("fileName");

      cv.addEventListener("change", () => {
        if (cv.files.length) {
          fileName.innerHTML = "📄 " + cv.files[0].name;
        }
      });

      document
        .getElementById("applicationForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData();

          formData.append("fullName", fullName.value);

          formData.append("email", email.value);

          formData.append("phone", phone.value);

          formData.append("cv", cv.files[0]);

          try {
            const API = "https://talenthub-v85u.onrender.com/api";
            const response = await fetch(
              "https://talenthub-v85u.onrender.com/api/applications/submit-applications/${oppId}",
              {
                method: "POST",

                body: formData,
              },
            );

            const data = await response.json();

            document.getElementById("message").innerHTML =
              "✅ Application submitted successfully";

            document.getElementById("applicationForm").reset();
            window.location.href = "index.html";
          } catch (error) {
            document.getElementById("message").innerHTML =
              "❌ Submission failed";
          }
        });
    </script>
  </body>
</html>
