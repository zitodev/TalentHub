<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Applications Dashboard</title>

    <style>
      * {
        box-sizing: border-box;

        font-family: "Inter", Arial, sans-serif;
      }

      body {
        margin: 0;

        background: linear-gradient(135deg, #eff6ff, #f8fafc);

        color: #0f172a;
      }

      /* HEADER */

      .header {
        padding: 40px 8%;

        display: flex;

        justify-content: space-between;

        align-items: center;

        background: white;

        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      }

      .logo {
        font-size: 28px;

        font-weight: 800;

        color: #2563eb;
      }

      .header p {
        color: #64748b;
      }

      /* DASHBOARD */

      .container {
        padding: 50px 8%;
      }

      .title {
        margin-bottom: 35px;
      }

      .title h1 {
        font-size: 40px;
      }

      .stats {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

        gap: 20px;

        margin-bottom: 40px;
      }

      .stat-card {
        background: white;

        padding: 25px;

        border-radius: 20px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .stat-card h2 {
        color: #2563eb;

        font-size: 35px;

        margin: 0;
      }

      /* APPLICATION CARDS */

      .cards {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

        gap: 25px;
      }

      .card {
        background: white;

        padding: 30px;

        border-radius: 22px;

        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);

        transition: 0.3s;

        border-left: 5px solid #2563eb;
      }

      .card:hover {
        transform: translateY(-8px);
      }

      .card h3 {
        margin-top: 0;

        color: #1e293b;
      }

      .info {
        margin-top: 20px;

        background: #f8fafc;

        padding: 15px;

        border-radius: 15px;
      }

      .info p {
        margin: 10px 0;

        color: #475569;
      }

      .badge {
        display: inline-block;

        background: #dbeafe;

        color: #2563eb;

        padding: 7px 15px;

        border-radius: 30px;

        font-size: 13px;

        font-weight: bold;
      }

      .empty {
        text-align: center;

        padding: 40px;

        background: white;

        border-radius: 20px;
      }

      @media (max-width: 700px) {
        .header {
          flex-direction: column;

          align-items: flex-start;
        }

        .title h1 {
          font-size: 30px;
        }
      }
    </style>
  </head>

  <body>
    <header class="header">
      <div>
        <div class="logo">TalentHub</div>

        <p>Application Management Dashboard</p>
      </div>
    </header>

    <div class="container">
      <div class="title">
        <h1>Student Applications</h1>

        <p>Review submitted applications from candidates.</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h2 id="totalApplications">0</h2>

          <p>Total Applications</p>
        </div>

        <div class="stat-card">
          <h2>Active</h2>

          <p>System Status</p>
        </div>

        <div class="stat-card">
          <h2>AI</h2>

          <p>Talent Matching</p>
        </div>
      </div>

      <div id="applicationList" class="cards"></div>
    </div>

    <script>
      async function fetchApplication() {
        try {
          const response = await fetch(
            "https://talenthub-v85u.onrender.com/api/applications/application-list",

            {
              credentials: "include",
            },
          );

          if (response.ok) {
            const data = await response.json();

            console.log(data);

            const applicationList = document.getElementById("applicationList");

            document.getElementById("totalApplications").innerHTML =
              data.length;

            applicationList.innerHTML = "";

            data.forEach((application) => {
              const card = document.createElement("div");

              card.className = "card";

              card.innerHTML = `


<span class="badge">

Application

</span>



<h3>

${application.fullName}

</h3>



<p>

📧 ${application.email}

</p>



<p>

📞 ${application.phone || "No phone"}

</p>





<div class="info">



<p>

📌 Opportunity:

<strong>

${application.opportunity?.title || "N/A"}

</strong>


</p>





<p>


Category:

${application.opportunity?.category || "N/A"}


</p>






<p>


Type:

${application.opportunity?.opportunityType || "N/A"}


</p>






</div>



`;

              applicationList.appendChild(card);
            });
          } else {
            throw new Error("Failed fetching applications");
          }
        } catch (error) {
          document.getElementById("applicationList").innerHTML = `


<div class="empty">

Unable to load applications

</div>


`;

          console.error(error);
        }
      }

      fetchApplication();
    </script>
  </body>
</html>
